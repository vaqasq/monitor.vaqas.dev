<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="refresh" content="30">
    <title>Monitor Dashboard</title>
</head>
<body>
    <h2>Monitoring Dashboard for vaqas.dev</h2>
    <table>
        <thead>
            <tr>
                <th>Container Names</th>
                <th>Status</th>
                <th>Timestamp</th>
                <th>CPU Usage</th>
                <th>Memory Usage</th>
            </tr>
        </thead>
        <tbody>
            <!-- Iterate over the slice of structs passed from Go -->
            {{range .}}
            <tr>
                <td>{{.Name}}</td>
                <td>{{.Status}}</td>
                <td>{{.Timestamp}}</td>
                <td>{{.CpuUsage}}</td>
                <td>{{.MemoryUsage}}</td>
            </tr>
            {{end}}
        </tbody>
    </table>
</body>
</html>
